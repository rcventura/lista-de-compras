<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Compras — Entrar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #070710;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.07);
            --accent: #f0a500;
            --accent-glow: rgba(240, 165, 0, 0.25);
            --text: #f0ebe0;
            --text-muted: rgba(240, 235, 224, 0.45);
            --input-bg: rgba(255, 255, 255, 0.04);
            --input-border: rgba(255, 255, 255, 0.1);
            --input-border-focus: rgba(240, 165, 0, 0.6);
        }

        html, body {
            height: 100%;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* Background orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            z-index: 0;
            animation: drift 14s ease-in-out infinite;
        }

        .bg-orb-1 {
            width: 560px;
            height: 560px;
            background: radial-gradient(circle, rgba(240, 165, 0, 0.11) 0%, transparent 70%);
            top: -140px;
            right: -120px;
            animation-delay: 0s;
        }

        .bg-orb-2 {
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, rgba(0, 185, 165, 0.09) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            animation-delay: -5s;
        }

        .bg-orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(130, 80, 210, 0.07) 0%, transparent 70%);
            top: 45%;
            left: 28%;
            animation-delay: -9s;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%       { transform: translate(22px, -22px) scale(1.04); }
            66%       { transform: translate(-16px, 16px) scale(0.97); }
        }

        /* Grain overlay */
        .grain {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
        }

        /* Page */
        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            z-index: 2;
        }

        /* Card */
        .card {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 48px 40px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03) inset,
                0 36px 80px rgba(0,0,0,0.45),
                0 0 70px rgba(240,165,0,0.04);
            animation: cardIn 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)    scale(1);    }
        }

        /* Logo */
        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 38px;
        }

        .logo-icon {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, var(--accent) 0%, #ff8c00 100%);
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 22px var(--accent-glow);
            flex-shrink: 0;
        }

        .logo-text .logo-name {
            display: block;
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.01em;
            line-height: 1;
        }

        .logo-text .logo-tagline {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-top: 4px;
            font-weight: 400;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: rgba(255,255,255,0.04);
            border-radius: 13px;
            padding: 4px;
            margin-bottom: 36px;
            position: relative;
        }

        .tab-indicator {
            position: absolute;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            top: 4px;
            height: calc(100% - 8px);
            transition: all 0.32s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 10px;
            transition: color 0.25s;
            position: relative;
            z-index: 1;
            user-select: none;
            letter-spacing: 0.01em;
        }

        .tab.active { color: var(--text); }

        /* Form panels */
        .forms-wrapper { position: relative; }

        .form-panel {
            display: none;
            flex-direction: column;
            gap: 16px;
            animation: panelIn 0.38s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .form-panel.active { display: flex; }

        @keyframes panelIn {
            from { opacity: 0; transform: translateX(12px); }
            to   { opacity: 1; transform: translateX(0);    }
        }

        /* Form groups */
        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.07em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            padding: 13px 16px 13px 44px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
            -webkit-appearance: none;
        }

        .input-wrapper input::placeholder {
            color: rgba(240,235,224,0.18);
        }

        .input-wrapper input:focus {
            border-color: var(--input-border-focus);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 0 3px rgba(240,165,0,0.1);
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            display: flex;
            transition: color 0.25s;
        }

        .input-wrapper:focus-within .input-icon { color: var(--accent); }

        .input-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            display: flex;
            transition: color 0.2s;
            line-height: 0;
        }

        .input-toggle:hover { color: var(--text); }
        .input-wrapper input.has-toggle { padding-right: 44px; }

        /* Forgot link row */
        .link-row {
            text-align: right;
            margin-top: -4px;
        }

        .text-link {
            font-size: 12px;
            color: var(--accent);
            cursor: pointer;
            text-decoration: none;
            opacity: 0.8;
            transition: opacity 0.2s;
            font-weight: 400;
            letter-spacing: 0.01em;
        }
        .text-link:hover { opacity: 1; }

        /* Primary button */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent) 0%, #ff8c00 100%);
            color: #07070f;
            border: none;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: transform 0.15s, box-shadow 0.25s, opacity 0.15s;
            box-shadow: 0 4px 22px rgba(240,165,0,0.3);
            margin-top: 4px;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 32px rgba(240,165,0,0.42);
        }

        .btn-primary:active {
            transform: translateY(0);
            opacity: 0.88;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 2px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--input-border);
        }

        .divider-text {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.07em;
            text-transform: uppercase;
        }

        /* Social button */
        .btn-social {
            width: 100%;
            padding: 13px;
            background: transparent;
            border: 1px solid var(--input-border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s, border-color 0.2s;
            letter-spacing: 0.01em;
        }

        .btn-social:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.2);
        }

        /* Forgot panel specifics */
        .form-hint {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.65;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            width: fit-content;
            transition: color 0.2s;
            margin-top: 4px;
        }
        .back-link:hover { color: var(--text); }

        /* Forgot success */
        .success-state {
            text-align: center;
            padding: 12px 0 8px;
        }

        .success-icon {
            width: 58px;
            height: 58px;
            background: rgba(240,165,0,0.09);
            border: 1px solid rgba(240,165,0,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
        }

        .success-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .success-text {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.65;
        }

        /* Branding */
        .branding {
            margin-top: 34px;
            text-align: center;
        }

        .branding a {
            font-size: 11px;
            color: rgba(240,235,224,0.18);
            text-decoration: none;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            transition: color 0.2s;
        }
        .branding a:hover { color: rgba(240,235,224,0.38); }
    </style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>
<div class="grain"></div>

<div class="page">
    <div class="card">

        <!-- Logo -->
        <div class="logo">
            <div class="logo-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(7,7,16,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <path d="M16 10a4 4 0 01-8 0"/>
                </svg>
            </div>
            <div class="logo-text">
                <span class="logo-name">Lista de Compras</span>
                <span class="logo-tagline">seu mercado organizado</span>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs" id="tabs">
            <div class="tab-indicator" id="tabIndicator"></div>
            <div class="tab active" data-tab="login"   onclick="switchTab('login')">Entrar</div>
            <div class="tab"        data-tab="cadastro" onclick="switchTab('cadastro')">Cadastrar</div>
        </div>

        <!-- Forms -->
        <div class="forms-wrapper">

            <!-- ── Login ── -->
            <div class="form-panel active" id="panel-login">

                <div class="form-group">
                    <label>E-mail</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                <polyline points="22,6 12,13 2,6"/>
                            </svg>
                        </span>
                        <input type="email" placeholder="seu@email.com">
                    </div>
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0110 0v4"/>
                            </svg>
                        </span>
                        <input type="password" id="loginPass" placeholder="••••••••" class="has-toggle">
                        <span class="input-toggle" onclick="togglePass('loginPass',this)">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                        </span>
                    </div>
                </div>

                <div class="link-row">
                    <a class="text-link" onclick="showForgot()">Esqueci minha senha</a>
                </div>

                <button class="btn-primary">Entrar</button>

                <div class="divider">
                    <div class="divider-line"></div>
                    <span class="divider-text">ou</span>
                    <div class="divider-line"></div>
                </div>

                <button class="btn-social">
                    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Continuar com Google
                </button>
            </div>

            <!-- ── Cadastro ── -->
            <div class="form-panel" id="panel-cadastro">

                <div class="form-group">
                    <label>Nome Completo</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
                            </svg>
                        </span>
                        <input type="text" placeholder="Seu nome completo">
                    </div>
                </div>

                <div class="form-group">
                    <label>E-mail</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                <polyline points="22,6 12,13 2,6"/>
                            </svg>
                        </span>
                        <input type="email" placeholder="seu@email.com">
                    </div>
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0110 0v4"/>
                            </svg>
                        </span>
                        <input type="password" id="cadastroPass" placeholder="Mínimo 8 caracteres" class="has-toggle">
                        <span class="input-toggle" onclick="togglePass('cadastroPass',this)">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                        </span>
                    </div>
                </div>

                <button class="btn-primary">Criar conta</button>

                <div class="divider">
                    <div class="divider-line"></div>
                    <span class="divider-text">ou</span>
                    <div class="divider-line"></div>
                </div>

                <button class="btn-social">
                    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Cadastrar com Google
                </button>
            </div>

            <!-- ── Esqueci a Senha ── -->
            <div class="form-panel" id="panel-forgot">

                <div id="forgotForm" style="display:flex; flex-direction:column; gap:16px;">
                    <p class="form-hint">Informe seu e-mail e enviaremos as instruções para redefinir sua senha.</p>

                    <div class="form-group">
                        <label>E-mail</label>
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                    <polyline points="22,6 12,13 2,6"/>
                                </svg>
                            </span>
                            <input type="email" placeholder="seu@email.com">
                        </div>
                    </div>

                    <button class="btn-primary" onclick="sendForgot()">Enviar instruções</button>
                </div>

                <div id="forgotSuccess" style="display:none; flex-direction:column; gap:16px;">
                    <div class="success-state">
                        <div class="success-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f0a500" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/>
                            </svg>
                        </div>
                        <div class="success-title">E-mail enviado!</div>
                        <p class="success-text">Verifique sua caixa de entrada e siga as instruções para redefinir sua senha.</p>
                    </div>
                </div>

                <div class="back-link" onclick="showLogin()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5"/><polyline points="12,19 5,12 12,5"/>
                    </svg>
                    Voltar para o login
                </div>
            </div>

        </div><!-- /forms-wrapper -->

        <!-- Branding -->
        <div class="branding">
            <a href="https://deerflow.tech" target="_blank">Created by Deerflow</a>
        </div>

    </div>
</div>

<script>
    let currentTab = 'login';

    function initIndicator() {
        const active = document.querySelector('.tab.active');
        if (!active) return;
        const ind = document.getElementById('tabIndicator');
        ind.style.width  = active.offsetWidth + 'px';
        ind.style.left   = active.offsetLeft  + 'px';
    }

    function switchTab(tab) {
        if (currentTab === tab) return;
        currentTab = tab;

        document.querySelectorAll('.tab').forEach(t =>
            t.classList.toggle('active', t.dataset.tab === tab)
        );

        const active = document.querySelector('.tab.active');
        const ind    = document.getElementById('tabIndicator');
        ind.style.width = active.offsetWidth + 'px';
        ind.style.left  = active.offsetLeft  + 'px';

        document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('panel-' + tab).classList.add('active');
        document.getElementById('tabs').style.display = '';
    }

    function showForgot() {
        document.getElementById('tabs').style.display = 'none';
        document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('panel-forgot').classList.add('active');
        document.getElementById('forgotForm').style.display    = 'flex';
        document.getElementById('forgotSuccess').style.display = 'none';
        currentTab = 'forgot';
    }

    function showLogin() {
        document.getElementById('tabs').style.display = '';
        switchTab('login');
    }

    function sendForgot() {
        document.getElementById('forgotForm').style.display    = 'none';
        document.getElementById('forgotSuccess').style.display = 'flex';
    }

    const EYE_OPEN = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const EYE_OFF  = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

    function togglePass(id, btn) {
        const input  = document.getElementById(id);
        const isPass = input.type === 'password';
        input.type   = isPass ? 'text' : 'password';
        btn.innerHTML = isPass ? EYE_OFF : EYE_OPEN;
    }

    window.addEventListener('load',   initIndicator);
    window.addEventListener('resize', initIndicator);
</script>

</body>
</html>
